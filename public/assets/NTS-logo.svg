<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="oklch(0.70 0.11 215)"/>
      <stop offset="100%" stop-color="oklch(0.52 0.11 228)"/>
    </linearGradient>
    <linearGradient id="a-ring" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="a-shine" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base square -->
  <rect x="0" y="0" width="160" height="160" rx="32" fill="url(#a-bg)"/>

  <!-- Top shine -->
  <rect x="0" y="0" width="160" height="160" rx="32" fill="url(#a-shine)"/>

  <!-- Full ring -->
  <circle cx="80" cy="80" r="60" stroke="url(#a-ring)" stroke-width="2" fill="none"/>

  <!-- Inner ring faint -->
  <circle cx="80" cy="80" r="50" stroke="white" stroke-width="1" stroke-opacity="0.08" fill="none"/>

  <!-- Sweep arc accent -->
  <path d="M 80 20 A 60 60 0 0 1 134 54"
    stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" stroke-opacity="0.6"/>

  <!-- Dot at end of arc -->
  <circle cx="134" cy="54" r="4" fill="white" fill-opacity="0.7"/>

  <!-- N as pure path — Outfit Bold proportions, centered at x=80 baseline y=103 -->
  <path d="M 54 48 L 54 103 L 65 103 L 65 67 L 95 103 L 107 103 L 107 48 L 96 48 L 96 84 L 66 48 Z"
    fill="oklch(0.98 0.02 201)"/>

  <!-- Border -->
  <rect x="0" y="0" width="160" height="160" rx="32" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
</svg>
